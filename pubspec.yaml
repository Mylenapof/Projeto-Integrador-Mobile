name: lourenco_confeitaria_app
description: App de pedidos e fidelidade da Lourenço Confeitaria
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegação
  go_router: ^13.0.0

  # Estado
  flutter_riverpod: ^2.4.0

  # Banco local
  sqflite: ^2.3.0
  path: ^1.9.0

  # Sessão
  shared_preferences: ^2.2.0

  # HTTP client
  dio: ^5.4.0
  http: ^1.2.0

  # IA - ModelScope
  google_generative_ai: ^0.4.3

  # Conectividade
  connectivity_plus: ^6.0.0

  # Autenticação OAuth2 para Firebase
  googleapis_auth: ^1.6.0

  # Links externos
  url_launcher: ^6.2.0

  # Cache de imagens
  cached_network_image: ^3.4.1

  # Firebase / Notificações
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/