name: lourenco_confeitaria_app
description: App de pedidos e fidelidade da Lourenço Confeitaria
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegação
  go_router: ^13.0.0

  # Estado
  flutter_riverpod: ^2.4.0

  # Banco local
  sqflite: ^2.3.0
  path: ^1.9.0

  # Sessão
  shared_preferences: ^2.2.0

  # HTTP client
  dio: ^5.4.0

  # Conectividade (para sincronização offline-first)
  connectivity_plus: ^6.0.0

  # Links externos
  url_launcher: ^6.2.0

    # IA - Google Gemini
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

